version: '5.1.0'

services:
  mongo:
    image: mongo:latest
    container_name: electro_pi_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: electro_pi_api
    ports:
      - "80:5000"
    depends_on:
      - mongo
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/electro-pi-db
      - JWT_SECRET=super_secret_key_123
      - JWT_REFRESH_SECRET=super_refresh_secret_456

volumes:
  mongo_data: